<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SQLTuner Client Dashboard</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <style>
    .social-auth {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      width: 100%;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
    }

    .btn-social:hover {
      background: rgba(var(--primary-rgb), 0.05);
      border-color: var(--primary);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: var(--space-6) 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .divider::before {
      margin-right: 15px;
    }

    .divider::after {
      margin-left: 15px;
    }

    .social-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>

<body>

  <div class="auth-wrapper">
    <!-- Outside Control Buttons (Top Right, Out of Card) -->
    <div class="auth-header-controls">
      <button class="toggle-btn rtl-toggle" aria-label="Toggle Layout Direction">RTL</button>
      <button class="toggle-btn theme-toggle" aria-label="Toggle Color Theme">🌙</button>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
      <a href="../index.html" class="logo-container" style="justify-content: center; margin-bottom: var(--space-8);">
        <div class="logo-icon">DB</div>
        <span style="font-size: 1.5rem;">SQLTuner</span>
      </a>

      <h2 style="font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: var(--space-2);">Welcome Back</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: var(--space-8);">Access your database tuning
        recommendation logs</p>

      <form novalidate onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" placeholder="" required>
          <span class="validation-tooltip"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-input-wrapper">
            <input class="form-control has-toggle" type="password" id="password" placeholder="" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)"
              aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <span class="validation-tooltip"></span>
        </div>

        <div
          style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6); font-size: 0.85rem; width: 100%;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="checkbox" style="accent-color: var(--primary);"> Remember Me
          </label>
          <a href="404.html" style="color: var(--primary); font-weight: 500;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social-auth">
        <button class="btn-social">
          <svg class="social-icon" viewBox="0 0 24 24">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Google
        </button>
        <button class="btn-social">
          <svg class="social-icon" viewBox="0 0 384 512" fill="currentColor">
            <path
              d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-43.8-19.3-71.6-18.8-38.5.6-73.6 22.5-93.5 56.8-41 70.8-10.5 175.7 29.1 232.8 19.3 27.9 42.5 59.2 72.8 58.1 28.7-1.1 39.6-18.5 74.3-18.5 34.4 0 44.5 18.5 74.9 17.8 31.1-.6 51.4-28.4 70.5-56.4 22-32.1 31.1-63.1 31.5-64.7-1.1-.4-61-23.4-61.2-93.1zm-42.3-179.6c15.8-19.2 26.5-45.9 23.6-72.5-22.9 1-50.7 15.3-67.1 34.5-14.7 17.1-27.5 44.4-24 70.5 25.4 2 51.8-13.3 67.5-32.5z" />
          </svg>
          Apple
        </button>
      </div>

      <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: var(--space-8);">
        Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Register
          here</a>
      </p>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    function handleLoginSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (email && password && password.length >= 6) {
        // Successful mock redirection to dashboard
        window.location.href = 'dashboard.html';
      }
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
  </script>
</body>

</html>
