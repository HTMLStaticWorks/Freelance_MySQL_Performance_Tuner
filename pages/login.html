<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SQLTuner Client Dashboard</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>

  <div class="auth-wrapper">
    <!-- Outside Control Buttons (Top Right, Out of Card) -->
    <div class="auth-header-controls">
      <button class="toggle-btn rtl-toggle" aria-label="Toggle Layout Direction">RTL</button>
      <button class="toggle-btn theme-toggle" aria-label="Toggle Color Theme">🌙</button>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
      <a href="../index.html" class="logo-container" style="justify-content: center; margin-bottom: var(--space-8);">
        <div class="logo-icon">DB</div>
        <span style="font-size: 1.5rem;">SQLTuner</span>
      </a>

      <h2 style="font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: var(--space-2);">Welcome Back</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: var(--space-8);">Access your database tuning recommendation logs</p>

      <form novalidate onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" placeholder="name@company.com" required>
          <span class="validation-tooltip"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="••••••••" required>
          <span class="validation-tooltip"></span>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6); font-size: 0.85rem; width: 100%;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="checkbox" style="accent-color: var(--primary);"> Remember Me
          </label>
          <a href="404.html" style="color: var(--primary); font-weight: 500;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: var(--space-4);">Sign In</button>
      </form>

      <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: var(--space-4);">
        Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Register here</a>
      </p>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    function handleLoginSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (email && password && password.length >= 6) {
        // Successful mock redirection to dashboard
        window.location.href = 'dashboard.html';
      }
    }
  </script>
</body>
</html>
